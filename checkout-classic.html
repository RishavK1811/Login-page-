<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Classic Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364, #4facfe);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Container */
.container{
    width:100%;
    max-width:420px;
}

/* Back Button */
.back-btn{
    display:inline-block;
    margin-bottom:20px;
    color:white;
    text-decoration:none;
    font-size:14px;
    opacity:0.8;
}

.back-btn:hover{
    opacity:1;
}

/* Card */
.checkout-card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding:30px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* Header */
.plan-header{
    text-align:center;
    margin-bottom:25px;
}

.plan-header h1{
    color:white;
    font-size:24px;
}

.plan-header p{
    color:#ccc;
    font-size:13px;
}

/* Price */
.price-section{
    text-align:center;
    margin-bottom:25px;
}

.original-price{
    text-decoration:line-through;
    color:#aaa;
    font-size:14px;
}

.final-price{
    font-size:36px;
    font-weight:600;
    color:#4facfe;
}

.discount-badge{
    background:#27ae60;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
}

/* Inputs */
.form-group{
    margin-bottom:15px;
}

label{
    color:#ddd;
    font-size:13px;
    margin-bottom:5px;
    display:block;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: rgba(255,255,255,0.15);
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    background: rgba(255,255,255,0.25);
    box-shadow:0 0 10px rgba(79,172,254,0.7);
}

/* Row */
.card-row{
    display:flex;
    gap:10px;
}

/* Button */
.purchase-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#4facfe,#00c6ff);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.purchase-btn:hover{
    transform: translateY(-2px);
    box-shadow:0 10px 25px rgba(79,172,254,0.5);
}

</style>
</head>

<body>

<div class="container">

<a href="plans.html" class="back-btn">← Back</a>

<div class="checkout-card">

<div class="plan-header">
    <h1>Classic Plan</h1>
    <p>Secure Checkout</p>
</div>

<div class="price-section">
    <div id="originalPrice" class="original-price">$9.00</div>
    <div class="final-price" id="finalPrice">$9.00</div>
    <div id="discountBadge" style="display:none;">
        <span class="discount-badge" id="discountText"></span>
    </div>
</div>

<div class="form-group">
    <label>Full Name</label>
    <input type="text" placeholder="Enter your name">
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="Enter email">
</div>

<div class="form-group">
    <label>Card Number</label>
    <input type="text" placeholder="1234 5678 9012 3456">
</div>

<div class="card-row">
    <div class="form-group">
        <label>Expiry</label>
        <input type="text" placeholder="MM/YY">
    </div>

    <div class="form-group">
        <label>CVV</label>
        <input type="text" placeholder="123">
    </div>
</div>

<button class="purchase-btn" onclick="completePurchase()">Complete Payment</button>

</div>

</div>

<script>
function getQueryParam(param){
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
}

function completePurchase(){
    const finalPrice = getQueryParam('finalPrice') || '9.00';
    alert("Payment Successful! ✅\nAmount: $" + finalPrice);
    window.location.href = 'plans.html';
}

window.onload = function(){
    const discount = parseInt(getQueryParam('discount')) || 0;
    const finalPrice = getQueryParam('finalPrice') || '9.00';

    document.getElementById('finalPrice').textContent = "$" + finalPrice;

    if(discount > 0){
        document.getElementById('discountBadge').style.display = 'block';
        document.getElementById('discountText').textContent = discount + "% OFF";
    }
}
</script>

</body>
</html>
