<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364, #4facfe);
    min-height:100vh;
    padding:40px 20px;
    color:white;
}

.container{max-width:1100px;margin:auto;}

.header{text-align:center;margin-bottom:40px;}
.header h1{font-size:38px;}
.header p{opacity:0.8;}

.coupon-section{
    background: rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
}

.coupon-input{
    padding:10px;
    border:none;
    border-radius:10px;
    width:60%;
}

.apply-coupon-btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}

.plans-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.plan-card{
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.price{
    font-size:32px;
    margin:10px 0;
}

.buy-btn{
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>Choose Your Plan</h1>
</div>

<div class="coupon-section">
    <input type="text" id="couponCode" class="coupon-input" placeholder="Enter coupon">
    <button onclick="applyCoupon()" class="apply-coupon-btn">Apply</button>
    <p id="couponMessage"></p>
</div>

<div class="plans-grid">

<div class="plan-card">
    <h2>Classic</h2>
    <div class="price" id="price-classic" data-original="9">$9</div>
    <button class="buy-btn" onclick="buyPlan('Classic',9)">Buy Now</button>
</div>

<div class="plan-card">
    <h2>VIP</h2>
    <div class="price" id="price-vip" data-original="29">$29</div>
    <button class="buy-btn" onclick="buyPlan('VIP',29)">Buy Now</button>
</div>

<div class="plan-card">
    <h2>Premium</h2>
    <div class="price" id="price-premium" data-original="99">$99</div>
    <button class="buy-btn" onclick="buyPlan('Premium',99)">Buy Now</button>
</div>

</div>
</div>

<script>

let discount = 0;

// Coupon logic
function applyCoupon(){
    const code = document.getElementById('couponCode').value.trim().toUpperCase();
    const msg = document.getElementById('couponMessage');

    if(code === "RISHAV1811"){
        discount = 0.9;
        msg.innerText = "🔥 90% Discount Applied!";
        msg.style.color = "lightgreen";
    } else {
        discount = 0;
        msg.innerText = "Invalid Coupon ❌";
        msg.style.color = "red";
    }

    updatePrices();
}

// Update prices
function updatePrices(){
    const plans = ['classic','vip','premium'];

    plans.forEach(plan=>{
        const el = document.getElementById(`price-${plan}`);
        const original = parseFloat(el.dataset.original);
        const final = (original * (1 - discount)).toFixed(2);

        if(discount > 0){
            el.innerHTML = `<span style="text-decoration:line-through;color:#aaa;">$${original}</span> <span style="color:#00ffcc;">$${final}</span>`;
        } else {
            el.innerText = `$${original}`;
        }
    });
}

// Buy button
function buyPlan(plan, price){
    const finalPrice = (price * (1 - discount)).toFixed(2);
    const discountPercent = Math.round(discount * 100);

    let page = "";

    if(plan === "Classic") page = "checkout-classic.html";
    if(plan === "VIP") page = "checkout-vip.html";
    if(plan === "Premium") page = "checkout-premium.html";

    window.location.href = `${page}?discount=${discountPercent}&finalPrice=${finalPrice}`;
}

</script>

</body>
</html>
