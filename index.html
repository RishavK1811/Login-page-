<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #0f2027, #1c3d5a, #2c5364, #4facfe);
    background-size:400% 400%;
    animation: gradientShift 10s ease infinite;
    overflow:hidden;
}

@keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Glass Card */
.login-container{
    width:100%;
    max-width:360px;
    padding:35px;
    border-radius:22px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    text-align:center;
    position:relative;
}

/* Title */
.login-container h1{
    color:#ffffff;
    margin-bottom:25px;
    font-weight:600;
    letter-spacing:1px;
}

/* Form Group */
.form-group{
    margin-bottom:18px;
    text-align:left;
}

label{
    color:#e0e0e0;
    font-size:13px;
    margin-bottom:6px;
    display:block;
}

/* Inputs */
input{
    width:100%;
    padding:13px;
    border:none;
    outline:none;
    border-radius:14px;
    background: rgba(255,255,255,0.12);
    color:white;
    font-size:14px;
    transition:0.3s;
}

input::placeholder{
    color:#bbb;
}

input:focus{
    background: rgba(255,255,255,0.22);
    box-shadow: 0 0 12px rgba(79,172,254,0.7);
    transform: scale(1.03);
}

/* Button */
button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:14px;
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 25px rgba(79,172,254,0.6);
}

button:active{
    transform: scale(0.97);
}

/* Subtle Glow Border */
.login-container::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:22px;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
    opacity:0.6;
    pointer-events:none;
}

</style>

<script>
function handleLogin(e) {
    e.preventDefault();
    const loginId = document.getElementById('loginId').value;
    const password = document.getElementById('password').value;
    
    if (loginId === 'Rishavk1811' && password === '1811') {
        window.location.href = 'plans.html';
    } else {
        alert('Invalid Login ID or Password!');
        document.getElementById('loginId').value = '';
        document.getElementById('password').value = '';
    }
}
</script>

</head>

<body>

<div class="login-container">
    <h1>Login Page</h1>

    <form onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Login ID</label>
            <input type="text" id="loginId" placeholder="Enter your ID" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
